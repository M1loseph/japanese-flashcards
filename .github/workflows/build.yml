name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  TERRAFORM_VERSION: 1.14.6

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run linter and format check
        run: npm run lint && npm run format-check

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Verify build directory
        run: test -d dist && echo "dist directory exists." || (echo "dist directory missing" && exit 1)

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform init
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform format check
        working-directory: terraform
        run: terraform fmt -check

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

  create_tag:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    outputs:
      JAPANESE_FLASHCARDS_VERSION: ${{ steps.create_tag.outputs.JAPANESE_FLASHCARDS_VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Assert current commit does not have a tag
        run: |
          HEAD_TAGS=$(git tag --points-at HEAD)
          if [ -n "$HEAD_TAGS" ]; then
            echo "Current commit already has a tag. Skipping release."
            exit 1
          fi

      - name: Create a tag
        id: create_tag
        run: |
          VERSION=$(git describe --tags --abbrev=0)

          MAJOR_VERSION=$(echo $VERSION | cut -d. -f 1)
          MINOR_VERSION=$(echo $VERSION | cut -d. -f 2)

          NEW_MINOR_VERSION=$((MINOR_VERSION + 1))

          NEW_VERSION="${MAJOR_VERSION}.${NEW_MINOR_VERSION}"
          git tag ${NEW_VERSION}
          git push --tags
          echo "JAPANESE_FLASHCARDS_VERSION=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

  publish_docker_image:
    runs-on: ubuntu-latest
    needs: create_tag
    if: github.ref == 'refs/heads/main'
    outputs:
      IMAGE_NAME: ${{ steps.generate_image_name.outputs.IMAGE_NAME }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image name
        id: generate_image_name
        run: |
          IMAGE_NAME="${{ vars.DOCKERHUB_USERNAME }}/jflashcards:${{ needs.create_tag.outputs.JAPANESE_FLASHCARDS_VERSION }}"
          echo "IMAGE_NAME=${IMAGE_NAME}" >> "$GITHUB_ENV"
          echo "IMAGE_NAME=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.IMAGE_NAME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy_to_gcp:
    runs-on: ubuntu-latest
    needs: publish_docker_image
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform init
        working-directory: terraform
        run: terraform init

      - name: Terraform plan
        working-directory: terraform
        run: |
          terraform plan \
            -var="jflashcards_image=${{ needs.publish_docker_image.outputs.IMAGE_NAME }}" \
            -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -out=tfplan \
            -input=false

      - name: Terraform apply
        working-directory: terraform
        run: |
          terraform apply tfplan -input=false
